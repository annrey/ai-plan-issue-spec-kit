name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build pytest

      - name: Compile Python
        run: python -m py_compile src/ai_plan_issue/planning.py src/ai_plan_issue/store.py src/ai_plan_issue/exporter.py src/ai_plan_issue/runtime.py src/ai_plan_issue/mutations.py src/ai_plan_issue/file_mutations.py src/ai_plan_issue/context_bundle.py src/ai_plan_issue/ledger.py src/ai_plan_issue/events.py src/ai_plan_issue/board_server.py src/ai_plan_issue/cli.py

      - name: Check browser JavaScript
        run: node --check src/ai_plan_issue/web/app.js

      - name: Run tests
        run: python -m pytest tests

      - name: Build distribution
        run: python -m build
